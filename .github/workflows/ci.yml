name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Display .NET version
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore ./Aether/Aether.sln

      - name: Build
        run: dotnet build ./Aether/Aether.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ./Aether/Aether.sln --no-build --configuration Release --verbosity normal